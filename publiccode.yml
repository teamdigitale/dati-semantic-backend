description:
  it:
    features:
      - search
      - indexing
    genericName: dati-semantic-backend
    longDescription: |
      Questo repository contiene il software di backend per il catalogo nazionale per la semantica dei dati schema.gov.it

      Il catalogo contribuisce a standardizzare e uniformare la descrizione degli e-service della Piattaforma Digitale Nazionale Dati e i payload scambiati attraverso le stesse.

      Il catalogo contiene le ontologie e i vocabolari controllati e scemi di dati attraverso i quali è

      possibile da un lato definire in modo non ambiguo i dati scambiati dagli e-service, dall'altro limitare i valori possibili dei campi che fanno

      riferimento ad elenchi specifici, in modo che non siano possibili errori

      di trascrizione o interpretazione degli stessi.
    shortDescription: Backend per il repository semantico del catalogo nazionale per la semantica dei dati
